<!doctype html>
<html lang="kk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кіру - DamiFood</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="appHeader"></div>
  <main class="container">
    <section class="card form-card">
      <div class="stack">
        <h2>Жеке аккаунтқа кіру</h2>
        <p>Демо аккаунттар: admin@dami.kz / Admin123, courier@dami.kz / Courier123, owner@dami.kz / Owner123</p>
        <form class="form" id="loginForm">
          <label>E-mail<input name="email" type="email" required></label>
          <label>Құпия сөз<input name="password" type="password" required></label>
          <button>Кіру</button>
        </form>
        <button class="secondary" id="resetBtn">Құпия сөзді e-mail арқылы қалпына келтіру</button>
      </div>
    </section>
  </main>
  <div class="toast-wrap"></div>
  <script src="/app.js"></script>
  <script>
    bootstrap();
    loginForm.onsubmit = async e => {
      e.preventDefault();
      try {
        const fd = Object.fromEntries(new FormData(loginForm));
        await Dami.api("/api/auth/login", { method: "POST", body: fd });
        location.href = "/pages/dashboard.html";
      } catch (err) { Dami.toast(err.message, true); }
    };
    resetBtn.onclick = async () => {
      const email = loginForm.email.value || prompt("E-mail енгізіңіз");
      if (!email) return;
      await Dami.api("/api/auth/reset", { method: "POST", body: { email } });
      Dami.toast("Қалпына келтіру сілтемесі e-mail арқылы жіберілді");
    };
  </script>
</body>
</html>
